<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920,height=1080,initial-scale=1">
    <meta name="theme-color" content="#0a0a1a">
    <title>ParentTV</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100vw;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: 'Montserrat', system-ui, sans-serif;
        }

        .tv-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: calc(100vw * 9 / 16);
            max-height: 100vh;
            max-width: calc(100vh * 16 / 9);
            background: #0a0a1a;
            display: flex;
            overflow: hidden;
        }

        .grid-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 28px 24px 28px 36px;
            min-width: 0;
        }

        .grid-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            height: 48px;
            flex-shrink: 0;
        }

        .grid-title {
            font-size: 28px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .page-dots {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .page-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2a2a4a;
            transition: background 0.2s;
        }

        .page-dot.active {
            background: #e94560;
            width: 24px;
            border-radius: 5px;
        }

        .grid-container {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 14px;
            min-height: 0;
        }

        .grid-item {
            position: relative;
            background: #141428;
            border: 3px solid transparent;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            outline: none;
            display: flex;
            flex-direction: column;
            transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
        }

        .grid-item:focus,
        .grid-item.focused {
            border-color: #fff;
            transform: scale(1.03);
            box-shadow: 0 0 24px rgba(233, 69, 96, 0.4), 0 8px 32px rgba(0,0,0,0.5);
            z-index: 2;
        }

        .grid-item-thumb {
            flex: 1;
            background: #0f0f2a;
            overflow: hidden;
            position: relative;
            min-height: 0;
        }

        .grid-item-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .grid-item-number {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 40px;
            height: 40px;
            background: #e94560;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            z-index: 1;
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        .grid-item-label {
            padding: 10px 12px;
            font-size: 15px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            background: #141428;
            flex-shrink: 0;
        }

        .grid-empty {
            background: #0c0c20;
            border-color: transparent;
            cursor: default;
        }

        .menu-area {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            padding: 28px 36px 28px 12px;
        }

        .menu-logo {
            font-size: 20px;
            font-weight: 800;
            color: #e94560;
            letter-spacing: 2px;
            margin-bottom: 28px;
            text-align: right;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            flex-shrink: 0;
        }

        .menu-list {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 0;
        }

        .menu-item {
            padding: 16px 20px;
            font-size: 20px;
            font-weight: 600;
            color: #5a5a7a;
            border-radius: 12px;
            cursor: pointer;
            outline: none;
            transition: all 0.15s;
            text-align: right;
            border: 3px solid transparent;
            flex-shrink: 0;
        }

        .menu-item.active {
            color: #fff;
            background: #1a1a3a;
        }

        .menu-item:focus,
        .menu-item.focused {
            color: #fff;
            background: #1e1e40;
            border-color: #e94560;
            box-shadow: 0 0 16px rgba(233, 69, 96, 0.3);
        }

        .menu-item.active:not(.focused) {
            border-color: transparent;
        }

        .channel-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(10, 10, 26, 0.95);
            border: 3px solid #e94560;
            border-radius: 20px;
            padding: 32px 52px;
            text-align: center;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.25s, transform 0.25s;
        }

        .channel-overlay.visible {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .overlay-number {
            width: 72px;
            height: 72px;
            background: #e94560;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 800;
            color: #fff;
            margin: 0 auto 16px;
        }

        .overlay-name {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
        }

        .loading-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            background: #0a0a1a;
            z-index: 100;
        }

        .loading-text {
            font-size: 28px;
            font-weight: 600;
            color: #5a5a7a;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 4px solid #1a1a3a;
            border-top-color: #e94560;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            background: #0a0a1a;
            z-index: 100;
        }

        .error-text {
            font-size: 26px;
            font-weight: 600;
            color: #e94560;
        }

        .error-sub {
            font-size: 18px;
            color: #5a5a7a;
        }
    </style>
</head>
<body>
    <div class="tv-frame" id="tvFrame">
        <div class="loading-screen" id="loadingScreen">
            <div class="loading-spinner"></div>
            <div class="loading-text">Завантаження...</div>
        </div>

        <div class="grid-area">
            <div class="grid-header">
                <div class="grid-title" id="gridTitle"></div>
                <div class="page-dots" id="pageDots"></div>
            </div>
            <div class="grid-container" id="gridContainer"></div>
        </div>

        <div class="menu-area">
            <div class="menu-logo">PARENT<span style="color:#fff">TV</span></div>
            <div class="menu-list" id="menuList"></div>
        </div>

        <div class="channel-overlay" id="channelOverlay">
            <div class="overlay-number" id="overlayNumber"></div>
            <div class="overlay-name" id="overlayName"></div>
        </div>
    </div>

    <script>
        var API_KEY = 'AIzaSyCqZPOKj1kVxWeOQFdEL-NiAfM1om0bczU';
        var SHEET_ID = '1gURThMgWLB4_dUG2dkpiU2R-g0mAXCeLs2ex2EpzW_4';
        var CACHE_TTL = 30 * 60 * 1000;
        var PAGE_SIZE = 9;

        var CATEGORIES = [];
        var currentCategoryIndex = 0;
        var currentPage = 0;
        var zone = 'menu';
        var gridFocusIndex = 0;
        var menuFocusIndex = 0;

        function extractVideoId(url) {
            if (!url) return '';
            var m = url.match(/[?&]v=([^&]+)/);
            if (m) return m[1];
            m = url.match(/youtu\.be\/([^?&]+)/);
            return m ? m[1] : '';
        }

        function thumbUrl(vid) {
            if (!vid) return '';
            return 'https://img.youtube.com/vi/' + vid + '/mqdefault.jpg';
        }

        function sheetsUrl(tab) {
            return 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + tab + '?key=' + API_KEY;
        }

        function parseRows(data) {
            if (!data.values || data.values.length < 2) return [];
            var headers = data.values[0];
            return data.values.slice(1).map(function(row) {
                var obj = {};
                headers.forEach(function(h, i) { obj[h] = row[i] || ''; });
                return obj;
            });
        }

        function getCached(key) {
            try {
                var raw = localStorage.getItem('ptv2_' + key);
                if (!raw) return null;
                var p = JSON.parse(raw);
                if (Date.now() - p.ts > CACHE_TTL) return null;
                return p.data;
            } catch(e) { return null; }
        }

        function setCache(key, data) {
            try {
                localStorage.setItem('ptv2_' + key, JSON.stringify({ ts: Date.now(), data: data }));
            } catch(e) {}
        }

        async function fetchSheet(tab) {
            var cached = getCached(tab);
            if (cached) return cached;
            var resp = await fetch(sheetsUrl(tab));
            var json = await resp.json();
            var rows = parseRows(json);
            setCache(tab, rows);
            return rows;
        }

        async function loadData() {
            try {
                var results = await Promise.all([
                    fetchSheet('channels'),
                    fetchSheet('categories'),
                    fetchSheet('items')
                ]);

                var channelsRaw = results[0];
                var categoriesRaw = results[1];
                var itemsRaw = results[2];

                var tvCategory = {
                    id: '__tv__',
                    name: '\u0422\u0435\u043b\u0435\u0431\u0430\u0447\u0435\u043d\u043d\u044f',
                    items: channelsRaw
                        .sort(function(a, b) { return (parseInt(a.number) || 99) - (parseInt(b.number) || 99); })
                        .map(function(r) {
                            return { title: r.name, videoId: extractVideoId(r.youtube_url) };
                        })
                };

                var catMap = {};
                var catOrder = [];
                categoriesRaw
                    .sort(function(a, b) { return (parseInt(a.sort_order) || 99) - (parseInt(b.sort_order) || 99); })
                    .forEach(function(c) {
                        catMap[c.id] = { id: c.id, name: c.name_ua, items: [] };
                        catOrder.push(c.id);
                    });

                itemsRaw
                    .sort(function(a, b) { return (parseInt(a.sort_order) || 99) - (parseInt(b.sort_order) || 99); })
                    .forEach(function(item) {
                        if (catMap[item.category_id]) {
                            catMap[item.category_id].items.push({
                                title: item.title,
                                videoId: extractVideoId(item.youtube_url)
                            });
                        }
                    });

                CATEGORIES = [tvCategory];
                catOrder.forEach(function(id) {
                    if (catMap[id].items.length > 0) {
                        CATEGORIES.push(catMap[id]);
                    }
                });

                return CATEGORIES.length > 0;
            } catch(e) {
                console.error('Load error:', e);
                return false;
            }
        }

        function totalPages(catIndex) {
            var items = CATEGORIES[catIndex] ? CATEGORIES[catIndex].items : [];
            return Math.max(1, Math.ceil(items.length / PAGE_SIZE));
        }

        function getCurrentPageItems() {
            var cat = CATEGORIES[currentCategoryIndex];
            if (!cat) return [];
            var start = currentPage * PAGE_SIZE;
            return cat.items.slice(start, start + PAGE_SIZE);
        }

        function renderMenu() {
            var list = document.getElementById('menuList');
            list.innerHTML = '';
            CATEGORIES.forEach(function(cat, i) {
                var el = document.createElement('div');
                el.className = 'menu-item';
                el.tabIndex = 0;
                el.textContent = cat.name;
                el.setAttribute('data-index', i);
                if (i === currentCategoryIndex) el.classList.add('active');
                list.appendChild(el);
            });
            updateMenuFocus();
        }

        function renderGrid() {
            var container = document.getElementById('gridContainer');
            var title = document.getElementById('gridTitle');
            var cat = CATEGORIES[currentCategoryIndex];

            title.textContent = cat ? cat.name : '';
            container.innerHTML = '';

            var items = getCurrentPageItems();

            for (var i = 0; i < PAGE_SIZE; i++) {
                var el = document.createElement('div');
                el.tabIndex = 0;

                if (items[i]) {
                    el.className = 'grid-item';
                    el.setAttribute('data-grid-index', i);

                    var vid = items[i].videoId;
                    var thumb = vid ? thumbUrl(vid) : '';

                    el.innerHTML =
                        '<div class="grid-item-thumb">' +
                            '<div class="grid-item-number">' + (i + 1) + '</div>' +
                            (thumb ? '<img src="' + thumb + '" alt="">' : '') +
                        '</div>' +
                        '<div class="grid-item-label">' + items[i].title + '</div>';
                } else {
                    el.className = 'grid-item grid-empty';
                    el.innerHTML =
                        '<div class="grid-item-thumb">' +
                            '<div class="grid-item-number" style="opacity:0.3">' + (i + 1) + '</div>' +
                        '</div>' +
                        '<div class="grid-item-label"></div>';
                }

                container.appendChild(el);
            }

            renderPageDots();
        }

        function renderPageDots() {
            var dots = document.getElementById('pageDots');
            var total = totalPages(currentCategoryIndex);
            if (total <= 1) {
                dots.innerHTML = '';
                return;
            }
            var html = '';
            for (var i = 0; i < total; i++) {
                html += '<div class="page-dot' + (i === currentPage ? ' active' : '') + '"></div>';
            }
            dots.innerHTML = html;
        }

        function updateMenuFocus() {
            var items = document.querySelectorAll('.menu-item');
            items.forEach(function(el, i) {
                el.classList.remove('focused');
                el.classList.remove('active');
                if (i === currentCategoryIndex) el.classList.add('active');
                if (zone === 'menu' && i === menuFocusIndex) {
                    el.classList.add('focused');
                }
            });
        }

        function updateGridFocus() {
            var items = document.querySelectorAll('.grid-item');
            items.forEach(function(el, i) {
                el.classList.remove('focused');
                if (zone === 'grid' && i === gridFocusIndex) {
                    el.classList.add('focused');
                }
            });
        }

        function switchCategory(index) {
            if (index < 0 || index >= CATEGORIES.length) return;
            currentCategoryIndex = index;
            menuFocusIndex = index;
            currentPage = 0;
            renderGrid();
            updateMenuFocus();
        }

        function openVideo(videoId) {
            if (!videoId) return;
            var intentUri = 'intent://www.youtube.com/watch?v=' + videoId + '#Intent;package=com.google.android.youtube.tv;scheme=https;end';
            var fallback = 'https://www.youtube.com/watch?v=' + videoId;

            showOverlay(videoId);

            try {
                window.location.href = intentUri;
                setTimeout(function() {
                    window.location.href = fallback;
                }, 150);
            } catch(e) {
                window.open(fallback, '_blank');
            }
        }

        function showOverlay(videoId) {
            var items = getCurrentPageItems();
            var idx = -1;
            for (var i = 0; i < items.length; i++) {
                if (items[i].videoId === videoId) { idx = i; break; }
            }
            if (idx === -1) return;

            var overlay = document.getElementById('channelOverlay');
            document.getElementById('overlayNumber').textContent = idx + 1;
            document.getElementById('overlayName').textContent = items[idx].title;
            overlay.classList.add('visible');
            setTimeout(function() { overlay.classList.remove('visible'); }, 2000);
        }

        function activateCurrentGridItem() {
            var items = getCurrentPageItems();
            if (items[gridFocusIndex] && items[gridFocusIndex].videoId) {
                openVideo(items[gridFocusIndex].videoId);
            }
        }

        function handleNumberKey(num) {
            var idx = num - 1;
            var items = getCurrentPageItems();
            if (items[idx] && items[idx].videoId) {
                gridFocusIndex = idx;
                updateGridFocus();
                openVideo(items[idx].videoId);
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key >= '1' && e.key <= '9') {
                e.preventDefault();
                handleNumberKey(parseInt(e.key));
                return;
            }

            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                if (zone === 'grid') {
                    activateCurrentGridItem();
                } else if (zone === 'menu') {
                    switchCategory(menuFocusIndex);
                }
                return;
            }

            if (e.key === 'Backspace' || e.key === 'GoBack') {
                e.preventDefault();
                if (zone === 'grid') {
                    zone = 'menu';
                    updateGridFocus();
                    updateMenuFocus();
                }
                return;
            }

            if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (zone === 'menu') {
                    if (menuFocusIndex > 0) {
                        menuFocusIndex--;
                        switchCategory(menuFocusIndex);
                    }
                } else {
                    var row = Math.floor(gridFocusIndex / 3);
                    if (row > 0) {
                        gridFocusIndex -= 3;
                        updateGridFocus();
                    } else {
                        if (currentPage > 0) {
                            currentPage--;
                            gridFocusIndex = 6 + (gridFocusIndex % 3);
                            renderGrid();
                            updateGridFocus();
                        }
                    }
                }
                return;
            }

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (zone === 'menu') {
                    if (menuFocusIndex < CATEGORIES.length - 1) {
                        menuFocusIndex++;
                        switchCategory(menuFocusIndex);
                    }
                } else {
                    var row2 = Math.floor(gridFocusIndex / 3);
                    if (row2 < 2) {
                        gridFocusIndex += 3;
                        updateGridFocus();
                    } else {
                        if (currentPage < totalPages(currentCategoryIndex) - 1) {
                            currentPage++;
                            gridFocusIndex = gridFocusIndex % 3;
                            renderGrid();
                            updateGridFocus();
                        }
                    }
                }
                return;
            }

            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (zone === 'menu') {
                    zone = 'grid';
                    gridFocusIndex = 0;
                    updateMenuFocus();
                    updateGridFocus();
                } else {
                    var col = gridFocusIndex % 3;
                    if (col > 0) {
                        gridFocusIndex--;
                        updateGridFocus();
                    }
                }
                return;
            }

            if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (zone === 'grid') {
                    var col2 = gridFocusIndex % 3;
                    if (col2 < 2) {
                        gridFocusIndex++;
                        updateGridFocus();
                    } else {
                        zone = 'menu';
                        updateGridFocus();
                        updateMenuFocus();
                    }
                }
                return;
            }
        });

        async function initialize() {
            var ok = await loadData();
            var loading = document.getElementById('loadingScreen');

            if (ok) {
                loading.style.display = 'none';
                menuFocusIndex = 0;
                currentCategoryIndex = 0;
                zone = 'menu';
                renderMenu();
                renderGrid();
                updateMenuFocus();
            } else {
                loading.innerHTML =
                    '<div class="error-text">\u041f\u043e\u043c\u0438\u043b\u043a\u0430 \u0437\u0430\u0432\u0430\u043d\u0442\u0430\u0436\u0435\u043d\u043d\u044f</div>' +
                    '<div class="error-sub">\u041f\u0435\u0440\u0435\u0432\u0456\u0440\u0442\u0435 \u043f\u0456\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u043d\u044f \u0434\u043e \u0456\u043d\u0442\u0435\u0440\u043d\u0435\u0442\u0443</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
