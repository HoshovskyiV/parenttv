<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1a1a2e">
    <title>ParentTV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
            overflow-x: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            padding: 40px;
        }

        .channel-bar {
            display: grid;
            grid-template-columns: repeat(9, 1fr);
            gap: 20px;
            margin-bottom: 60px;
            width: 100%;
        }

        .channel-button {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px 16px;
            background: #16213e;
            border: 4px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-height: 140px;
            position: relative;
            outline: none;
        }

        .channel-number {
            width: 64px;
            height: 64px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
        }

        .channel-name {
            font-size: 22px;
            text-align: center;
            color: #ffffff;
            word-wrap: break-word;
            width: 100%;
            font-weight: 600;
        }

        .channel-button:focus {
            border-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .section-title {
            font-size: 28px;
            font-weight: bold;
            margin-top: 40px;
            margin-bottom: 30px;
            color: #ffffff;
        }

        .section-title.category {
            font-size: 22px;
            margin-top: 50px;
            margin-bottom: 25px;
        }

        .featured-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(550px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .featured-card {
            background: #16213e;
            border: 4px solid transparent;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            display: flex;
            flex-direction: column;
            min-height: 400px;
        }

        .featured-card:focus {
            border-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.6);
        }

        .card-thumbnail {
            width: 100%;
            height: 280px;
            background: #0f3460;
            flex-shrink: 0;
            overflow: hidden;
        }

        .card-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-content {
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 12px;
            color: #ffffff;
            line-height: 1.3;
        }

        .card-description {
            font-size: 18px;
            color: #a0a0b0;
            line-height: 1.4;
        }

        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .video-card {
            background: #16213e;
            border: 4px solid transparent;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            display: flex;
            flex-direction: column;
            min-height: 350px;
        }

        .video-card:focus {
            border-color: #ffffff;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.5);
        }

        .video-thumbnail {
            width: 100%;
            height: 180px;
            background: #0f3460;
            flex-shrink: 0;
            overflow: hidden;
        }

        .video-thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-content {
            padding: 16px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .video-title {
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 8px;
        }

        .video-meta {
            font-size: 14px;
            color: #a0a0b0;
        }

        .channel-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(26, 26, 46, 0.95);
            border: 4px solid #e94560;
            border-radius: 16px;
            padding: 40px 60px;
            text-align: center;
            z-index: 1000;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .channel-overlay.visible {
            opacity: 1;
        }

        .overlay-number {
            width: 80px;
            height: 80px;
            background: #e94560;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            font-weight: bold;
            color: #ffffff;
            margin: 0 auto 20px;
        }

        .overlay-name {
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
        }

        .scroll-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 20px;
        }

        .scroll-container::-webkit-scrollbar {
            width: 12px;
        }

        .scroll-container::-webkit-scrollbar-track {
            background: #16213e;
            border-radius: 6px;
        }

        .scroll-container::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 6px;
        }

        .scroll-container::-webkit-scrollbar-thumb:hover {
            background: #ff5a7a;
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <div class="channel-bar" id="channelBar"></div>

        <div id="featuredSection"></div>

        <div id="categoriesSection"></div>
    </div>

    <div class="channel-overlay" id="channelOverlay">
        <div class="overlay-number" id="overlayNumber"></div>
        <div class="overlay-name" id="overlayName"></div>
    </div>

    <script>
        var API_KEY = 'AIzaSyCqZPOKj1kVxWeOQFdEL-NiAfM1om0bczU';
        var SHEET_ID = '1gURThMgWLB4_dUG2dkpiU2R-g0mAXCeLs2ex2EpzW_4';
        var CACHE_TTL = 30 * 60 * 1000;

        var CHANNELS = [];
        var FEATURED_VIDEOS = [];
        var CATEGORIES = [];

        var focusedElement = null;
        var focusMap = {};

        function extractVideoId(url) {
            if (!url) return 'dQw4w9WgXcQ';
            var match = url.match(/[?&]v=([^&]+)/);
            return match ? match[1] : 'dQw4w9WgXcQ';
        }

        function thumbUrl(videoId) {
            return 'https://img.youtube.com/vi/' + videoId + '/hqdefault.jpg';
        }

        function sheetsUrl(tab) {
            return 'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + tab + '?key=' + API_KEY;
        }

        function parseRows(data) {
            if (!data.values || data.values.length < 2) return [];
            var headers = data.values[0];
            return data.values.slice(1).map(function(row) {
                var obj = {};
                headers.forEach(function(h, i) { obj[h] = row[i] || ''; });
                return obj;
            });
        }

        function getCached(key) {
            try {
                var raw = localStorage.getItem('ptv_' + key);
                if (!raw) return null;
                var parsed = JSON.parse(raw);
                if (Date.now() - parsed.ts > CACHE_TTL) return null;
                return parsed.data;
            } catch(e) { return null; }
        }

        function setCache(key, data) {
            try {
                localStorage.setItem('ptv_' + key, JSON.stringify({ ts: Date.now(), data: data }));
            } catch(e) {}
        }

        async function fetchSheet(tab) {
            var cached = getCached(tab);
            if (cached) return cached;
            var resp = await fetch(sheetsUrl(tab));
            var json = await resp.json();
            var rows = parseRows(json);
            setCache(tab, rows);
            return rows;
        }

        async function loadData() {
            try {
                var results = await Promise.all([
                    fetchSheet('channels'),
                    fetchSheet('featured'),
                    fetchSheet('categories'),
                    fetchSheet('items')
                ]);

                var channelsRaw = results[0];
                var featuredRaw = results[1];
                var categoriesRaw = results[2];
                var itemsRaw = results[3];

                CHANNELS = channelsRaw.map(function(r) {
                    return { number: parseInt(r.number), name: r.name, videoId: extractVideoId(r.youtube_url) };
                });

                FEATURED_VIDEOS = featuredRaw
                    .sort(function(a, b) { return (parseInt(a.priority) || 99) - (parseInt(b.priority) || 99); })
                    .map(function(r) {
                        return { title: r.title, description: r.description, videoId: extractVideoId(r.youtube_url) };
                    });

                var catMap = {};
                categoriesRaw
                    .sort(function(a, b) { return (parseInt(a.sort_order) || 99) - (parseInt(b.sort_order) || 99); })
                    .forEach(function(c) {
                        catMap[c.id] = { name: c.name_ua, videos: [] };
                    });

                itemsRaw
                    .sort(function(a, b) { return (parseInt(a.sort_order) || 99) - (parseInt(b.sort_order) || 99); })
                    .forEach(function(item) {
                        if (catMap[item.category_id]) {
                            catMap[item.category_id].videos.push({
                                title: item.title,
                                description: item.type || 'video',
                                videoId: extractVideoId(item.youtube_url)
                            });
                        }
                    });

                CATEGORIES = Object.values(catMap);
                return true;
            } catch(e) {
                console.error('API error:', e);
                return false;
            }
        }

        function buildYouTubeIntentUri(videoId) {
            return 'intent://www.youtube.com/watch?v=' + videoId + '#Intent;package=com.google.android.youtube.tv;scheme=https;end';
        }

        function buildYouTubeUrl(videoId) {
            return 'https://www.youtube.com/watch?v=' + videoId;
        }

        function openVideo(videoId) {
            var intentUri = buildYouTubeIntentUri(videoId);
            var fallbackUrl = buildYouTubeUrl(videoId);

            try {
                window.location.href = intentUri;
                setTimeout(function() {
                    window.location.href = fallbackUrl;
                }, 100);
            } catch (e) {
                window.open(fallbackUrl, '_blank');
            }
        }

        function renderChannelBar() {
            var bar = document.getElementById('channelBar');
            bar.innerHTML = '';

            CHANNELS.forEach(function(channel, index) {
                var button = document.createElement('button');
                button.className = 'channel-button';
                button.tabIndex = 0;
                button.innerHTML = '<div class="channel-number">' + channel.number + '</div><div class="channel-name">' + channel.name + '</div>';

                button.addEventListener('click', function() {
                    showChannelOverlay(channel.number, channel.name);
                    openVideo(channel.videoId);
                });

                button.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        button.click();
                    }
                });

                bar.appendChild(button);
                focusMap['channel-' + index] = button;
            });
        }

        function renderFeatured() {
            var section = document.getElementById('featuredSection');
            var html = '<div class="section-title">\u0412\u0438\u0431\u0440\u0430\u043d\u0456</div><div class="featured-container">';

            FEATURED_VIDEOS.forEach(function(video, index) {
                html += '<button class="featured-card" tabindex="0" data-focus-id="featured-' + index + '">';
                html += '<div class="card-thumbnail"><img src="' + thumbUrl(video.videoId) + '" alt="' + video.title + '"></div>';
                html += '<div class="card-content"><div>';
                html += '<div class="card-title">' + video.title + '</div>';
                html += '<div class="card-description">' + video.description + '</div>';
                html += '</div></div></button>';
            });

            html += '</div>';
            section.innerHTML = html;

            var cards = section.querySelectorAll('.featured-card');
            cards.forEach(function(card, index) {
                focusMap['featured-' + index] = card;

                card.addEventListener('click', function() {
                    openVideo(FEATURED_VIDEOS[index].videoId);
                });

                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });
            });
        }

        function renderCategories() {
            var section = document.getElementById('categoriesSection');
            var html = '';

            CATEGORIES.forEach(function(category, catIndex) {
                html += '<div class="section-title category">' + category.name + '</div>';
                html += '<div class="category-grid">';

                category.videos.forEach(function(video, videoIndex) {
                    var focusId = 'category-' + catIndex + '-' + videoIndex;
                    html += '<button class="video-card" tabindex="0" data-focus-id="' + focusId + '">';
                    html += '<div class="video-thumbnail"><img src="' + thumbUrl(video.videoId) + '" alt="' + video.title + '"></div>';
                    html += '<div class="video-content">';
                    html += '<div class="video-title">' + video.title + '</div>';
                    html += '<div class="video-meta">' + video.description + '</div>';
                    html += '</div></button>';
                });

                html += '</div>';
            });

            section.innerHTML = html;

            var cards = section.querySelectorAll('.video-card');
            cards.forEach(function(card) {
                var focusId = card.getAttribute('data-focus-id');
                focusMap[focusId] = card;

                var parts = focusId.split('-');
                var catIdx = parseInt(parts[1]);
                var vidIdx = parseInt(parts[2]);
                var video = CATEGORIES[catIdx].videos[vidIdx];

                card.addEventListener('click', function() {
                    openVideo(video.videoId);
                });

                card.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        card.click();
                    }
                });
            });
        }

        function showChannelOverlay(number, name) {
            var overlay = document.getElementById('channelOverlay');
            document.getElementById('overlayNumber').textContent = number;
            document.getElementById('overlayName').textContent = name;

            overlay.classList.add('visible');
            setTimeout(function() {
                overlay.classList.remove('visible');
            }, 3000);
        }

        function handleNumberKey(key) {
            var number = parseInt(key);
            if (number >= 1 && number <= 9 && CHANNELS[number - 1]) {
                var channel = CHANNELS[number - 1];
                showChannelOverlay(channel.number, channel.name);
                openVideo(channel.videoId);
            }
        }

        function setFocus(element) {
            if (focusedElement) {
                focusedElement.blur();
            }
            focusedElement = element;
            element.focus();
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function initializeFocus() {
            var firstChannelButton = document.querySelector('.channel-button');
            if (firstChannelButton) {
                setFocus(firstChannelButton);
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key >= '1' && e.key <= '9') {
                e.preventDefault();
                handleNumberKey(e.key);
                return;
            }

            if (e.key === 'ArrowUp' || e.key === 'ArrowDown' || e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
                e.preventDefault();
                handleArrowKey(e.key);
                return;
            }

            if (e.key === 'Backspace' || e.key === 'GoBack') {
                e.preventDefault();
                scrollToTop();
                return;
            }

            if (e.key === 'Enter' || e.key === ' ') {
                if (focusedElement) {
                    focusedElement.click();
                }
            }
        });

        function handleArrowKey(key) {
            if (!focusedElement) {
                initializeFocus();
                return;
            }

            var currentGrid = focusedElement.closest('.channel-bar, .featured-container, .category-grid');
            if (!currentGrid) return;

            if (key === 'ArrowLeft' || key === 'ArrowRight') {
                handleHorizontalNavigation(key, currentGrid);
            } else if (key === 'ArrowUp' || key === 'ArrowDown') {
                handleVerticalNavigation(key, currentGrid);
            }
        }

        function handleHorizontalNavigation(key, grid) {
            var focusable = Array.from(grid.querySelectorAll('[tabindex="0"]'));
            var currentIndex = focusable.indexOf(focusedElement);

            if (currentIndex === -1) return;

            var nextIndex;
            if (key === 'ArrowLeft') {
                nextIndex = currentIndex > 0 ? currentIndex - 1 : focusable.length - 1;
            } else {
                nextIndex = currentIndex < focusable.length - 1 ? currentIndex + 1 : 0;
            }

            if (focusable[nextIndex]) {
                setFocus(focusable[nextIndex]);
            }
        }

        function handleVerticalNavigation(key, currentGrid) {
            var nextGrid = null;

            if (key === 'ArrowUp') {
                if (currentGrid.classList.contains('category-grid')) {
                    var prev = currentGrid.previousElementSibling ? currentGrid.previousElementSibling.previousElementSibling : null;
                    if (prev && prev.classList.contains('category-grid')) {
                        nextGrid = prev;
                    } else {
                        var fc = document.querySelector('.featured-container');
                        nextGrid = fc || document.querySelector('.channel-bar');
                    }
                } else if (currentGrid.classList.contains('featured-container')) {
                    nextGrid = document.querySelector('.channel-bar');
                } else if (currentGrid.classList.contains('channel-bar')) {
                    return;
                }
            } else if (key === 'ArrowDown') {
                if (currentGrid.classList.contains('channel-bar')) {
                    var fc2 = document.querySelector('.featured-container');
                    nextGrid = fc2 || document.querySelector('.category-grid');
                } else if (currentGrid.classList.contains('featured-container')) {
                    nextGrid = document.querySelector('.category-grid');
                } else if (currentGrid.classList.contains('category-grid')) {
                    var next = currentGrid.nextElementSibling ? currentGrid.nextElementSibling.nextElementSibling : null;
                    if (next && next.classList.contains('category-grid')) {
                        nextGrid = next;
                    }
                }
            }

            if (nextGrid) {
                var focusable = Array.from(nextGrid.querySelectorAll('[tabindex="0"]'));
                if (focusable.length > 0) {
                    var currentIndex = Array.from(currentGrid.querySelectorAll('[tabindex="0"]')).indexOf(focusedElement);
                    var nextIndex = Math.min(currentIndex, focusable.length - 1);
                    setFocus(focusable[Math.max(0, nextIndex)]);
                }
            }
        }

        function scrollToTop() {
            var scrollContainer = document.querySelector('.scroll-container');
            scrollContainer.scrollTop = 0;
            initializeFocus();
        }

        function showLoading() {
            document.getElementById('channelBar').innerHTML = '<div style="grid-column:1/-1;text-align:center;font-size:28px;color:#a0a0b0;padding:40px">\u0417\u0430\u0432\u0430\u043d\u0442\u0430\u0436\u0435\u043d\u043d\u044f...</div>';
        }

        function showError() {
            document.getElementById('channelBar').innerHTML = '<div style="grid-column:1/-1;text-align:center;font-size:28px;color:#e94560;padding:40px">\u041f\u043e\u043c\u0438\u043b\u043a\u0430 \u0437\u0430\u0432\u0430\u043d\u0442\u0430\u0436\u0435\u043d\u043d\u044f. \u041f\u0435\u0440\u0435\u0432\u0456\u0440\u0442\u0435 \u043f\u0456\u0434\u043a\u043b\u044e\u0447\u0435\u043d\u043d\u044f.</div>';
        }

        async function initialize() {
            showLoading();
            var ok = await loadData();
            if (ok && CHANNELS.length > 0) {
                renderChannelBar();
                renderFeatured();
                renderCategories();
                initializeFocus();
            } else {
                showError();
            }
        }

        document.addEventListener('DOMContentLoaded', initialize);
    </script>
</body>
</html>
